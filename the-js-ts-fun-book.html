<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The JS & TS Fun Book - From Zero to Fullstack Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg: #12151A;
  --surface: #1D1F25;
  --text: #FFFFFF;
  --text-muted: rgba(255,255,255,0.7);
  --border: rgba(255,255,255,0.15);
  --accent: #D9FE06;
  --accent-hover: #c5e805;
  --accent-text: #12151A;
  --heading: #D9FE06;
  --code-bg: #0d0f14;
  --code-text: #e0e0e0;
  --quiz-correct-bg: #1a3a1a;
  --quiz-correct-border: #4CAF50;
  --quiz-correct-text: #4CAF50;
  --quiz-wrong-bg: #3a1a1a;
  --quiz-wrong-border: #f44336;
  --quiz-wrong-text: #f44336;
  --score-bg: rgba(217,254,6,0.1);
  --score-border: rgba(217,254,6,0.3);
  --icon-size: 20px;
}

html[data-theme="light"] {
  --bg: #F4F5F5;
  --surface: #FFFFFF;
  --text: #12151A;
  --text-muted: rgba(18,21,26,0.65);
  --border: #DDDDDD;
  --accent: #D9FE06;
  --accent-hover: #b8d804;
  --accent-text: #12151A;
  --heading: #12151A;
  --code-bg: #1e1e2e;
  --code-text: #e0e0e0;
  --quiz-correct-bg: #e8f5e9;
  --quiz-correct-border: #4CAF50;
  --quiz-correct-text: #2e7d32;
  --quiz-wrong-bg: #fbe9e7;
  --quiz-wrong-border: #f44336;
  --quiz-wrong-text: #c62828;
  --score-bg: rgba(18,21,26,0.05);
  --score-border: rgba(18,21,26,0.15);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Poppins', sans-serif;
  line-height: 1.7;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}

header {
  padding: 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  transition: background 0.3s, border-color 0.3s;
}

.hdr {
  max-width: 1400px;
  margin: 0 auto;
}

.hdr-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1.2rem;
}

.hdr-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.logo {
  font-size: 2.8rem;
}

.hdr-txt h1 {
  font-size: 1.9rem;
}

.hdr-txt p {
  color: var(--text-muted);
  font-size: 0.9rem;
}

.theme-toggle {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  font-size: 1.2rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 44px;
  height: 44px;
}

.theme-toggle:hover {
  border-color: var(--accent);
  background: var(--bg);
}

.progress-bar {
  height: 8px;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  margin-top: 0.5rem;
  border: 1px solid var(--border);
  transition: background 0.3s, border-color 0.3s;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 8px;
  transition: width 0.4s;
}

.progress-text {
  margin-top: 0.4rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 1rem 2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  max-width: 100%;
  overflow-x: auto;
  transition: background 0.3s, border-color 0.3s;
}

.tab {
  padding: 0.45rem 0.9rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.78rem;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  transition: all 0.25s;
  white-space: nowrap;
}

.tab:hover {
  border-color: var(--accent);
  color: var(--text);
}

.tab.active {
  background: var(--accent);
  color: var(--accent-text);
  border-color: var(--accent);
}

.tab.done {
  background: rgba(217,254,6,0.15);
  color: var(--heading);
  border-color: var(--accent);
}

.icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: var(--icon-size);
  height: var(--icon-size);
  vertical-align: middle;
}

.section-icon {
  display: inline-flex;
  align-items: center;
  margin-right: 0.4rem;
  color: var(--heading);
}

.section-icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

main {
  max-width: 900px;
  margin: 2rem auto;
  padding: 0 2rem;
}

.lesson-head {
  text-align: center;
  margin-bottom: 2rem;
}

.lesson-emoji {
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
}

.lesson-emoji svg {
  width: 56px;
  height: 56px;
  stroke: var(--heading);
  fill: none;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.tab svg.tab-icon {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  vertical-align: -2px;
  margin-right: 2px;
}

.lesson-title {
  font-size: 2rem;
  margin-bottom: 0.3rem;
  color: var(--heading);
  font-weight: 700;
}

.lesson-sub {
  color: var(--text-muted);
  font-size: 1rem;
}

.analogy-box {
  border-radius: 12px;
  padding: 1.8rem;
  margin: 1.5rem 0;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: background 0.3s, border-color 0.3s;
}

.analogy-box h3 {
  margin-bottom: 0.5rem;
  font-size: 1.1rem;
  color: var(--text);
}

.analogy-box p {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.7;
}

.points {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 1rem;
  margin: 1.5rem 0;
}

.point {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  transition: transform 0.2s, background 0.3s, border-color 0.3s;
}

.point:hover {
  transform: translateY(-3px);
}

.point {
  border-left: 3px solid var(--heading);
}

.point-title {
  font-weight: 700;
  margin-bottom: 0.3rem;
  font-size: 0.95rem;
  color: var(--heading);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.point-title::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--heading);
  border-radius: 50%;
  flex-shrink: 0;
}

.point-desc {
  color: var(--text-muted);
  font-size: 0.85rem;
}

.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.2rem;
  margin: 1.5rem 0;
}

.col-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.3rem;
  transition: background 0.3s, border-color 0.3s;
}

.col-box h3 {
  margin-bottom: 0.5rem;
  font-size: 1rem;
  color: var(--text);
}

.col-box p {
  color: var(--text-muted);
  font-size: 0.88rem;
  line-height: 1.6;
}

.code-toggle {
  display: inline-block;
  margin: 1.5rem 0;
  padding: 0.6rem 1.5rem;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}

.code-toggle:hover {
  background: var(--bg);
  border-color: var(--accent);
  color: var(--heading);
}

.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  margin: 0.5rem 0 1.5rem;
  overflow-x: auto;
  font-family: "Fira Code", Consolas, monospace;
  font-size: 0.82rem;
  line-height: 1.6;
  color: var(--code-text);
  white-space: pre;
  transition: background 0.3s, border-color 0.3s, color 0.3s;
}

.nav-btns {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin: 2.5rem 0;
}

.btn {
  padding: 0.7rem 2rem;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  border: none;
  transition: all 0.2s;
  font-family: 'Poppins', sans-serif;
}

.btn-prev {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-prev:hover {
  border-color: var(--accent);
  color: var(--heading);
}

.btn-next {
  background: var(--accent);
  color: var(--accent-text);
  font-weight: 700;
}

.btn-next:hover {
  background: var(--accent-hover);
}

.fun-fact {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  margin: 1.2rem 0;
  transition: background 0.3s, border-color 0.3s;
}

.fun-fact h4 {
  color: var(--heading);
  margin-bottom: 0.3rem;
}

.fun-fact p {
  color: var(--text-muted);
  font-size: 0.88rem;
}

.quiz-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  margin: 1.2rem 0;
  transition: background 0.3s, border-color 0.3s;
}

.quiz-box h4 {
  color: var(--heading);
  margin-bottom: 0.5rem;
}

.quiz-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 0.6rem 1rem;
  margin: 0.3rem 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
  font-family: 'Poppins', sans-serif;
}

.quiz-btn:hover {
  border-color: var(--accent);
  color: var(--heading);
}

.quiz-btn.correct {
  background: var(--quiz-correct-bg);
  border-color: var(--quiz-correct-border);
  color: var(--quiz-correct-text);
}

.quiz-btn.wrong {
  background: var(--quiz-wrong-bg);
  border-color: var(--quiz-wrong-border);
  color: var(--quiz-wrong-text);
}

.quiz-counter {
  color: var(--heading);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
  font-weight: 600;
}

.quiz-score {
  margin-top: 1.5rem;
  padding: 1rem;
  background: var(--score-bg);
  border: 1px solid var(--score-border);
  border-radius: 8px;
  text-align: center;
  color: var(--heading);
  font-weight: 600;
  display: none;
}

.challenge {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  margin: 1.2rem 0;
  transition: background 0.3s, border-color 0.3s;
}

.challenge h4 {
  color: var(--heading);
  margin-bottom: 0.3rem;
}

.challenge p {
  color: var(--text-muted);
  font-size: 0.88rem;
}

footer {
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
  transition: color 0.3s, border-color 0.3s;
}

@media(max-width: 700px) {
  .two-col {
    grid-template-columns: 1fr;
  }
  .tabs {
    padding: 0.8rem 1rem;
  }
  .lesson-title {
    font-size: 1.5rem;
  }
  main {
    padding: 0 1rem;
  }
  .hdr-top {
    flex-direction: column;
    align-items: flex-start;
  }
}
/* Achievement System */
.achievement-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeIn 0.3s ease;
  backdrop-filter: blur(4px);
}

.achievement-card {
  background: var(--surface);
  border: 2px solid var(--accent);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  max-width: 420px;
  width: 90%;
  text-align: center;
  animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  box-shadow: 0 0 40px rgba(217,254,6,0.15), 0 0 80px rgba(217,254,6,0.05);
  position: relative;
  overflow: hidden;
}

.achievement-card::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px;
  height: 4px;
  background: var(--accent);
}

.achievement-icon {
  width: 72px;
  height: 72px;
  margin: 0 auto 1rem;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: bounce 0.6s ease 0.3s both;
}

.achievement-icon svg {
  width: 36px;
  height: 36px;
  stroke: var(--accent-text);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.achievement-badge {
  display: inline-block;
  padding: 0.3rem 1rem;
  background: var(--accent);
  color: var(--accent-text);
  border-radius: 999px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 0.8rem;
}

.achievement-title {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--heading);
  margin-bottom: 0.4rem;
}

.achievement-subtitle {
  font-size: 0.95rem;
  color: var(--text-muted);
  margin-bottom: 0.3rem;
}

.achievement-score {
  font-size: 2rem;
  font-weight: 800;
  color: var(--heading);
  margin: 0.8rem 0;
}

.achievement-msg {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 1.2rem;
  line-height: 1.5;
}

.achievement-close {
  padding: 0.6rem 2rem;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: all 0.2s;
}

.achievement-close:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

.achievement-stars {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  margin: 0.8rem 0;
}

.achievement-star {
  width: 28px;
  height: 28px;
  transition: all 0.3s;
}

.achievement-star.filled {
  stroke: var(--accent);
  fill: var(--accent);
  animation: starPop 0.3s ease both;
}

.achievement-star.empty {
  stroke: var(--border);
  fill: none;
}

.achievement-star:nth-child(2) { animation-delay: 0.15s; }
.achievement-star:nth-child(3) { animation-delay: 0.3s; }

/* Confetti particles */
.confetti-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 10000;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: confettiFall linear forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes popIn {
  from { transform: scale(0.7) translateY(20px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

@keyframes bounce {
  0% { transform: scale(0); }
  50% { transform: scale(1.2); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}

@keyframes starPop {
  0% { transform: scale(0) rotate(-30deg); }
  60% { transform: scale(1.3) rotate(10deg); }
  100% { transform: scale(1) rotate(0); }
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

code:`// A simple React component — it's just a function! 🎯

}`,

{id:7,emoji:"🏰",title:"Why NestJS?",subtitle:"Express Grew Up and Got Organized",
analogy:"Express is like a studio apartment — everything in one room, you decide where stuff goes. NestJS is like a well-designed house with labeled rooms: kitchen (services), front door (controllers), hallways (modules). Both work, but the house is WAY easier to manage when you have 50 rooms!",
analogyEmoji:"🏠",
points:[
{t:"Built-in Structure",d:"Module → Controller → Service pattern. Everyone organizes code the same way — no more 'where did John put that file?'"},
{t:"Dependency Injection",d:"Instead of manually creating instances, you just declare what you need and NestJS delivers it. Like room service!"},
{t:"TypeScript First",d:"NestJS is built FOR TypeScript. Decorators (@Get, @Post, @Injectable) make code readable and self-documenting."},
{t:"Batteries Included",d:"Validation, auth guards, Swagger docs, WebSockets, microservices — all built-in or plug-and-play."}
],
whatIs:"NestJS is a progressive Node.js framework for building server-side applications. Built on top of Express (or Fastify), it provides an opinionated structure inspired by Angular, using modules, controllers, and services.",
realWorld:"NestJS is used by Adidas, Roche, Autodesk, and many startups. It's the most popular structured Node.js framework, with over 60K GitHub stars.",
code:`// The NestJS Holy Trinity 🔺
// 1. MODULE — wires everything together
@Module({
  controllers: [UserController],
  providers: [UserService],
})
export class UserModule {}

// 2. CONTROLLER — handles HTTP requests (the front door 🚪)
@Controller('users')
export class UserController {
  constructor(private userService: UserService) {}
  //          ↑ NestJS auto-injects this! Magic! ✨

  @Get()          // GET /users
  findAll() {
    return this.userService.findAll();
  }

  @Get(':id')     // GET /users/123
  findOne(@Param('id') id: string) {
    return this.userService.findOne(id);
  }

  @Post()         // POST /users
  create(@Body() data: CreateUserDto) {
    return this.userService.create(data);
  }
}

// 3. SERVICE — business logic (the brain 🧠)
@Injectable()
export class UserService {
  constructor(private prisma: PrismaService) {}

  findAll() {
    return this.prisma.user.findMany();
  }

  findOne(id: string) {
    return this.prisma.user.findUnique({ where: { id } });
  }

  create(data: CreateUserDto) {
    return this.prisma.user.create({ data });
  }
}`,
funFact:"NestJS was created by Kamil Myśliwiec in 2017 because he was frustrated that Node.js had no structure like Angular did for frontend. He basically thought 'why can't backend be organized too?' and just... built it. 😤🛠️",

],

code:`// Without Redis — database gets hammered 😵

// Request 1:
User → Backend → Redis (miss!) → Database (200ms)
              → Store in Redis (cache it!)

// Requests 2-100:
User → Backend → Redis (HIT! 2ms) → "Here's your data!"
              → Database: *sipping coffee* ☕

// Redis in your docker-compose.yml:
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

// Using Redis with NestJS:
@Injectable()
export class CacheService {
  constructor(@Inject(CACHE_MANAGER) private cache: Cache) {}

  async getProperty(id: string) {
    // Check Redis first
    const cached = await this.cache.get(\`property:\${id}\`);
    if (cached) return cached; // Cache HIT! ⚡

    // Cache miss — ask database
    const property = await this.prisma.property.findUnique({
      where: { id },
    });

    // Store in Redis for next time (expire in 5 min)
    await this.cache.set(\`property:\${id}\`, property, 300);
    return property;
  }
}`,

whatIs:"Bull is a Node.js library for creating robust job queues backed by Redis. It handles background processing, retries, scheduling, and concurrency — so your API stays fast while heavy work happens behind the scenes.",
realWorld:"Any app that sends emails, processes images, generates PDFs, or sends push notifications uses a job queue. Bull is the most popular choice for Node.js/NestJS applications.",
code:`// The Problem: User waits for email to send ⏳
@Post('signup')

// The Solution: Queue it with Bull! 🎯
// Step 1: Add job to queue (instant!)
@Post('signup')
async signup(@Body() data: SignupDto) {
  const user = await this.prisma.user.create({ data });

  // This returns INSTANTLY — job added to queue
  await this.emailQueue.add('welcome-email', {

    name: user.name,
  });

  return user; // User gets response in milliseconds! 🚀
}

// Step 2: Process the job in the background
@Processor('email')

{id:13,emoji:"🔐",title:"Authentication — JWT & Guards",subtitle:"Who Are You? Prove It!",
analogy:"Authentication is like a nightclub. The bouncer (Guard) checks your ID (JWT token) at the door. If valid, you're in! If expired or fake, you're out. Some VIP rooms (admin routes) need a special stamp (role) on your wristband!",

points:[

{t:"Role-Based Access",d:"Admin can do everything, User can do less, Guest can do least. Guards enforce these rules automatically."}
],
whatIs:"Authentication verifies WHO you are (login). Authorization verifies WHAT you can do (permissions). JWTs are stateless tokens that contain encoded user info, verified by the server using a secret key.",
realWorld:"Nearly every web app uses JWT for authentication. Google, GitHub, and Stripe all use OAuth + JWT. NestJS makes it clean with decorators like @UseGuards() and @Roles().",
code:`// 1. Login — get your JWT token 🎟️
@Controller('auth')
export class AuthController {
  @Post('login')
  async login(@Body() dto: LoginDto) {
    const user = await this.authService.validateUser(
      dto.email, dto.password
    );
    // Create JWT with user info
    const token = this.jwtService.sign({
      sub: user.id,
      email: user.email,
      role: user.role, // 'admin', 'user', etc.
    });
    return { access_token: token };
  }
}

// 2. JWT Guard — the bouncer 🚪
@Injectable()
export class JwtGuard extends AuthGuard('jwt') {
  // Passport automatically verifies the token!
}

// 3. Role Guard — VIP check 🌟
@Injectable()
export class RolesGuard implements CanActivate {
  canActivate(context: ExecutionContext): boolean {
    const requiredRoles = this.reflector.get&lt;string[]&gt;(
      'roles', context.getHandler()
    );
    const user = context.switchToHttp().getRequest().user;
    return requiredRoles.includes(user.role);
  }
}

// 4. Using guards on routes — clean &amp; simple! ✨
@Controller('admin')
@UseGuards(JwtGuard, RolesGuard)  // Must be logged in + right role
export class AdminController {
  @Get('dashboard')
  @Roles('admin')  // Only admins!
  getDashboard() {
    return { message: 'Welcome to admin panel!' };
  }

  @Get('stats')
  @Roles('admin', 'manager')  // Admins OR managers
  getStats() {
    return this.statsService.getAll();
  }
}`,

code:`// 1. Upload a file to S3 📤
import { S3Client, PutObjectCommand } from '@aws-sdk/client-s3';

const s3 = new S3Client({ region: 'us-east-1' });

async function uploadFile(file: Buffer, fileName: string) {
  await s3.send(new PutObjectCommand({
    Bucket: 'my-app-uploads',
    Key: \`uploads/\${Date.now()}-\${fileName}\`,
    Body: file,
    ContentType: 'image/jpeg',
  }));
}

// 2. Generate a pre-signed URL (temporary access) 🔗
import { getSignedUrl } from '@aws-sdk/s3-request-presigner';

async function getUploadUrl(fileName: string) {
  const command = new PutObjectCommand({
    Bucket: 'my-app-uploads',
    Key: \`uploads/\${fileName}\`,
  });

  // URL valid for 15 minutes — then it expires!
  const url = await getSignedUrl(s3, command, { expiresIn: 900 });
  return url; // Frontend uses this URL to upload directly!
}

// 3. NestJS file upload endpoint 📁
@Controller('files')
export class FileController {
  @Post('upload')
  @UseInterceptors(FileInterceptor('file'))
  async upload(@UploadedFile() file: Express.Multer.File) {
    const key = \`uploads/\${Date.now()}-\${file.originalname}\`;

    await this.s3Service.upload({
      bucket: 'my-app-uploads',
      key,
      body: file.buffer,
      contentType: file.mimetype,
    });

    return { url: \`https://my-app-uploads.s3.amazonaws.com/\${key}\` };
  }
}`,

whatIs:"WebSockets provide a persistent, bidirectional communication channel between client and server. Unlike HTTP (request-response), WebSocket connections stay open, allowing the server to push data to clients in real-time.",
realWorld:"Slack, Discord, WhatsApp Web, Google Docs collaborative editing, live sports scores, stock tickers — all use WebSockets for real-time updates.",
code:`// 1. NestJS WebSocket Gateway 🚀
@WebSocketGateway({
  cors: { origin: '*' },
})
export class ChatGateway {
  @WebSocketServer()
  server: Server;

  // When a client sends a message
  @SubscribeMessage('sendMessage')
  handleMessage(client: Socket, payload: { room: string; text: string }) {
    // Broadcast to everyone in the room
    this.server.to(payload.room).emit('newMessage', {
      text: payload.text,
      sender: client.id,
      timestamp: new Date(),
    });
  }

  // When a client joins a room
  @SubscribeMessage('joinRoom')
  handleJoinRoom(client: Socket, room: string) {
    client.join(room);
    this.server.to(room).emit('userJoined', {
      message: \`Someone joined the room!\`,
    });
  }
}

// 2. React client — connect and listen 📡
import { io } from 'socket.io-client';

const socket = io('http://localhost:3000');

function ChatRoom({ room }) {
  const [messages, setMessages] = useState([]);

  useEffect(() => {
    socket.emit('joinRoom', room);

    socket.on('newMessage', (msg) => {
      setMessages(prev => [...prev, msg]);
    });

    return () => { socket.off('newMessage'); };
  }, [room]);

  const sendMessage = (text) => {
    socket.emit('sendMessage', { room, text });
  };

  return (/* render messages and input */);
}`,

analogy:"A NestJS app is like a well-organized company. The CEO (AppModule) oversees departments (feature modules). Each department has a receptionist (controller), workers (services), and security (guards). Nobody does someone else's job!",

whatIs:"NestJS follows a layered architecture: Modules organize features, Controllers handle HTTP, Services contain business logic, and cross-cutting concerns (validation, logging, auth) are handled by Pipes, Guards, Interceptors, and Filters.",
realWorld:"This architecture pattern (separation of concerns) is used by enterprise companies worldwide. It scales from a 1-person project to a 100-person team without becoming a mess.",
code:`// The NestJS Request Lifecycle 🔄
// Request → Middleware → Guards → Interceptors (before)
//        → Pipes → Handler → Interceptors (after)
//        → Exception Filters → Response

// 1. Pipe — validate incoming data 🔍
@Injectable()
export class ParseObjectIdPipe implements PipeTransform {
  transform(value: string) {
    if (!Types.ObjectId.isValid(value)) {
      throw new BadRequestException('Invalid ID format');
    }
    return value;
  }
}

// Usage: @Param('id', ParseObjectIdPipe) id: string

// 2. Interceptor — log all requests ⏱️
@Injectable()
export class LoggingInterceptor implements NestInterceptor {
  intercept(context: ExecutionContext, next: CallHandler) {
    const req = context.switchToHttp().getRequest();
    const now = Date.now();
    console.log(\`→ \${req.method} \${req.url}\`);

    return next.handle().pipe(
      tap(() => console.log(\`← \${Date.now() - now}ms\`)),
    );
  }
}

// 3. Exception Filter — beautiful error responses 🎨
@Catch(HttpException)
export class HttpExceptionFilter implements ExceptionFilter {
  catch(exception: HttpException, host: ArgumentsHost) {
    const response = host.switchToHttp().getResponse();
    const status = exception.getStatus();

    response.status(status).json({
      success: false,
      statusCode: status,
      message: exception.message,
      timestamp: new Date().toISOString(),
    });
  }
}

// 4. Full module structure 📁
// modules/
// ├── user/
// │   ├── user.module.ts
// │   ├── user.controller.ts
// │   ├── user.service.ts
// │   ├── dto/
// │   │   ├── create-user.dto.ts
// │   │   └── update-user.dto.ts
// │   └── entities/
// │       └── user.entity.ts
// ├── product/
// │   └── ...
// └── auth/
//     └── ...`,

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleTheme(){
  const html=document.documentElement;
  const isDark=!html.hasAttribute('data-theme');
  if(isDark){
    html.setAttribute('data-theme','light');
    localStorage.setItem('theme','light');
  }else{
    html.removeAttribute('data-theme');
    localStorage.setItem('theme','dark');
  }
  updateThemeIcons();
}

function updateThemeIcons(){
  const isDark=!document.documentElement.hasAttribute('data-theme');
  const sun=document.getElementById('icon-sun');
  const moon=document.getElementById('icon-moon');
  if(sun&&moon){
    sun.style.display=isDark?'block':'none';
    moon.style.display=isDark?'none':'block';
  }
}

function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved==='light'){
    document.documentElement.setAttribute('data-theme','light');
  }
  updateThemeIcons();
}

function icon(id,size){
  const s=size||'24';
  let svg=ICONS[id]||'';
  return svg.replace('<svg ','<svg class="tab-icon" width="'+s+'" height="'+s+'" ');
}

function bigIcon(id){
  return ICONS[id]||'';
}

function render(){
  const pct=Math.round(completed.size/L.length*100);
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('ptxt').textContent=completed.size+' / '+L.length+' lessons completed — '+pct+'%';

  let tabsHtml='';
  L.forEach((l,i)=>{
    const cls=i===current?'active':completed.has(i)?'done':'';
    tabsHtml+=`<div class="tab ${cls}" onclick="goTo(${i})">${icon(l.id,'14')} ${l.id}</div>`;

  h+=`<div class="points">`;

    h+=`<div class="point"><div class="point-title">${p.t}</div><div class="point-desc">${p.d}</div></div>`;

  h+=`<div class="two-col">`;
  h+=`<div class="col-box"><h3><span class="section-icon"><svg viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></span>What is it?</h3><p>${l.whatIs}</p></div>`;

  h+=`</div>`;

    h+=`<div class="fun-fact"><h4><span class="section-icon"><svg viewBox="0 0 24 24"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></span>Fun Fact</h4><p>${l.funFact}</p></div>`;
  }

  if(l.quiz && Array.isArray(l.quiz)){
    l.quiz.forEach((q, qIdx)=>{
      const quizKey=`${current}-${qIdx}`;
      const answered=quizScores[quizKey]!==undefined;
      h+=`<div class="quiz-box" id="quiz-${qIdx}"><div class="quiz-counter"><span class="section-icon"><svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg></span>Quiz ${qIdx+1} of ${l.quiz.length}</div><p style="margin-bottom:1rem;color:var(--text);font-weight:600">${q.q}</p>`;

        h+=`<button class="quiz-btn" id="quiz-btn-${qIdx}-${i}" onclick="checkQuiz(this,${i},${q.ans},${qIdx})">${o}</button>`;
      });
      h+=`</div>`;
    });
    const totalQuestions=l.quiz.length;
    let correctCount=0;
    for(let i=0;i<totalQuestions;i++){
      if(quizScores[`${current}-${i}`]===true) correctCount++;
    }
    if(correctCount>0 || Object.keys(quizScores).some(k=>k.startsWith(current+'-'))){

  h+=`<div style="text-align:center"><span class="code-toggle" onclick="toggleCode()"><span class="section-icon"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>${codeVisible?'Hide Code':'Show Code Example'}</span></div>`;

  h+=`<button class="btn btn-next" onclick="markAndNext()">${current<L.length-1?'Complete & Next <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-left:4px"><polyline points="9 18 15 12 9 6"/></svg>':'Finish! <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-left:4px"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'}</button>`;
  h+=`</div>`;

  document.getElementById('content').innerHTML=h;
}

function goTo(i){current=i;codeVisible=false;render();window.scrollTo(0,0);}
function goPrev(){if(current>0){current--;codeVisible=false;render();window.scrollTo(0,0);}}
function markAndNext(){completed.add(current);if(current<L.length-1){current++;codeVisible=false;}render();window.scrollTo(0,0);}
function toggleCode(){codeVisible=!codeVisible;render();}

function getRandomAchievement(score,total){
  const pct=score/total;
  let pool;
  if(pct===1) pool=ACHIEVEMENTS.perfect;
  else if(pct>=0.75) pool=ACHIEVEMENTS.great;
  else if(pct>=0.5) pool=ACHIEVEMENTS.good;
  else pool=ACHIEVEMENTS.tryAgain;
  return pool[Math.floor(Math.random()*pool.length)];
}

function getStars(score,total){
  if(score===total) return 3;
  if(score/total>=0.66) return 2;
  if(score>0) return 1;
  return 0;
}

function getAchievementIcon(score,total){
  const pct=score/total;
  if(pct===1) return '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  if(pct>=0.75) return '<svg viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 010 5H18"/><path d="M6 9l6 12 6-12"/></svg>';
  if(pct>=0.5) return '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
  return '<svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>';
}

function getBadgeLabel(score,total){
  const pct=score/total;
  if(pct===1) return 'PERFECT SCORE';
  if(pct>=0.75) return 'GREAT JOB';
  if(pct>=0.5) return 'NICE TRY';
  return 'KEEP GOING';
}

function spawnConfetti(){
  const container=document.createElement('div');
  container.className='confetti-container';
  document.body.appendChild(container);
  const colors=['#D9FE06','#FFFFFF','#c5e805','#b8d804','#4CAF50','#2196F3'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.width=(4+Math.random()*8)+'px';
    c.style.height=(4+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>0.5?'50%':'2px';
    c.style.animationDuration=(1.5+Math.random()*2)+'s';
    c.style.animationDelay=(Math.random()*0.8)+'s';
    container.appendChild(c);
  }
  setTimeout(()=>container.remove(),4000);
}

function showAchievement(score,total){
  const a=getRandomAchievement(score,total);
  const stars=getStars(score,total);
  const starSvg='<svg class="achievement-star" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

  let starsHtml='<div class="achievement-stars">';
  for(let i=0;i<3;i++){
    starsHtml+=`<svg class="achievement-star ${i<stars?'filled':'empty'}" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  }
  starsHtml+='</div>';

  const overlay=document.createElement('div');
  overlay.className='achievement-overlay';
  overlay.innerHTML=`
    <div class="achievement-card">
      <div class="achievement-icon">${getAchievementIcon(score,total)}</div>
      <div class="achievement-badge">${getBadgeLabel(score,total)}</div>
      <div class="achievement-title">${a.title}</div>
      ${starsHtml}
      <div class="achievement-score">${score} / ${total}</div>
      <div class="achievement-msg">${a.msg}</div>
      <button class="achievement-close" onclick="this.closest('.achievement-overlay').remove()">Continue Learning</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',(e)=>{if(e.target===overlay)overlay.remove();});

  if(score/total>=0.66) spawnConfetti();
}

let shownAchievements=new Set();

function checkQuiz(btn,picked,ans,quizIdx){
  const quizBox=document.getElementById(`quiz-${quizIdx}`);
  const siblings=quizBox.querySelectorAll('.quiz-btn');
  const quizKey=`${current}-${quizIdx}`;
  const isCorrect=(picked===ans);
  quizScores[quizKey]=isCorrect;
  siblings.forEach((b,i)=>{
    b.classList.remove('correct','wrong');
    if(i===ans) b.classList.add('correct');
    else if(i===picked&&picked!==ans) b.classList.add('wrong');
    b.disabled=true;
  });
  const l=L[current];
  if(l.quiz && Array.isArray(l.quiz)){
    const totalQuestions=l.quiz.length;
    let correctCount=0;
    let answeredCount=0;
    for(let i=0;i<totalQuestions;i++){
      if(quizScores[`${current}-${i}`]!==undefined){
        answeredCount++;
        if(quizScores[`${current}-${i}`]===true) correctCount++;
      }
    }
    const scoreDiv=document.getElementById('quiz-score');
    if(scoreDiv){
      scoreDiv.style.display='block';
      scoreDiv.innerHTML=`<span class="section-icon"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></span>You got ${correctCount}/${totalQuestions} correct! ${correctCount===totalQuestions?'Perfect!':correctCount>=Math.ceil(totalQuestions*0.75)?'Great job!':correctCount>=Math.ceil(totalQuestions*0.5)?'Good effort!':'Keep practicing!'}`;
    }
    if(answeredCount===totalQuestions && !shownAchievements.has(current)){
      shownAchievements.add(current);
      setTimeout(()=>showAchievement(correctCount,totalQuestions),600);
    }
  }
}

initTheme();
render();
